<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>ARTATVA · animated rotor</title>
<!--
  Self-contained, drop-in animated logo.
  ─────────────────────────────────────
  • Single HTML file. No build step. Works offline once the Google Fonts
    have loaded (or substitute local fonts of your choice in the @import).
  • Embed it anywhere with:
        <iframe src="artatva-rotor.html"
                style="width: 480px; height: 134px; border: 0; background: transparent;"
                title="ARTATVA"></iframe>
  • Or open it directly to preview.
  • The page itself is transparent — it inherits whatever background the host
    provides. Default ink = navy (#0E1C36); good on cream/beige surfaces.
    For dark surfaces, set --ink to cream on the <html> element via inline
    style or a parent stylesheet:
        <iframe src="artatva-rotor.html?ink=light" …>   ← see script at bottom.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@500&family=Tiro+Devanagari+Sanskrit&display=swap" rel="stylesheet">

<style>
  :root {
    --ink:  #0E1C36;
    --gold: #C6973F;
    --teal: #0A8C8C;
  }
  /* "Light-on-dark" override — append ?ink=light to the URL. */
  :root.dark-surface { --ink: #FBF5E7; }

  html, body {
    margin: 0; padding: 0; height: 100%;
    background: transparent;
    /* Keep the mark crisp at any size. */
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }
  body { display: grid; place-items: center; }

  /* The mark fills its host. CSS aspect-ratio matches the SVG viewBox. */
  .anim-mark {
    position: relative;
    width: 100%;
    aspect-ratio: 720 / 200;
    max-width: 100vw;
    max-height: 100vh;
  }

  /* Two halves of the 720-unit grid:
       left   0..272   = 37.78%   (full ART anchor: brushstroke A + RT)
       right  272..720 = 62.22%   (rotor slot: ATVA / तत्त्व) */
  .anim-mark .left-half,
  .anim-mark .right-half {
    position: absolute; top: 0; height: 100%;
  }
  .anim-mark .left-half  { left: 0;       width: 37.78%; }
  .anim-mark .right-half { left: 37.78%;  width: 62.22%; perspective: 2000px; }
  .anim-mark .left-half svg,
  .anim-mark .right-half svg { width: 100%; height: 100%; display: block; }

  /* 3D rotor — flips between Latin ATVA (front) and Devanagari तत्त्व (back)
     on its own center axis. 6-second loop with eased mid-flip pauses. */
  .rotor3d {
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transform-origin: 50% 50%;
    animation: rotor-flip 6s cubic-bezier(0.65, 0.05, 0.35, 0.95) infinite;
  }
  @keyframes rotor-flip {
    0%, 36%  { transform: rotateY(0deg); }
    50%, 86% { transform: rotateY(180deg); }
    100%     { transform: rotateY(360deg); }
  }
  .rotor3d > .face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
  }
  .rotor3d > .face.back { transform: rotateY(180deg); }

  /* Reduced-motion: hold on the English face. */
  @media (prefers-reduced-motion: reduce) {
    .rotor3d { animation: none; }
  }
</style>
</head>
<body>

  <div class="anim-mark" role="img" aria-label="ARTATVA — Latin TATVA flipping to Devanagari तत्त्व">

    <!-- LEFT ANCHOR · A R T  (x = 0..272 in the 720-unit grid) -->
    <div class="left-half">
      <svg viewBox="0 0 272 200" preserveAspectRatio="xMinYMid meet" overflow="visible">
        <!-- Brushstroke A: cap-height 132, baseline y=160, x=0..96 -->
        <g transform="translate(0, 28)">
          <path d="M 4 132 L 38 0 L 54 0 L 22 132 Z" fill="#0E1C36"/>
          <path d="M 92 132 L 58 0 L 42 0 L 74 132 Z" fill="#0E1C36"/>
          <rect x="14" y="78" width="68" height="6" rx="3" fill="#C6973F"/>
          <circle cx="48" cy="22" r="6" fill="#0A8C8C"/>
          <rect x="-2" y="130" width="22" height="3" fill="#0E1C36"/>
          <rect x="76" y="130" width="22" height="3" fill="#0E1C36"/>
        </g>
        <!-- RT, baseline y=160, Newsreader 132 -->
        <text x="100" y="160"
              font-family="Newsreader, 'Times New Roman', serif"
              font-weight="500" font-size="132" letter-spacing="-3"
              fill="#0E1C36">RT</text>
      </svg>
    </div>

    <!-- ROTOR · ATVA  ↔  तत्त्व  (x = 272..720, slot width 448) -->
    <div class="right-half">
      <div class="rotor3d">
        <div class="face front">
          <svg viewBox="0 0 448 200" preserveAspectRatio="xMinYMid meet" overflow="visible">
            <text x="0" y="160"
                  font-family="Newsreader, 'Times New Roman', serif"
                  font-weight="500" font-size="132" letter-spacing="-3"
                  fill="#0E1C36">ATVA</text>
          </svg>
        </div>
        <div class="face back">
          <svg viewBox="0 0 448 200" preserveAspectRatio="xMinYMid meet" overflow="visible">
            <text x="0" y="160"
                  font-family="'Tiro Devanagari Sanskrit', 'Noto Serif Devanagari', serif"
                  font-weight="400" font-size="146"
                  fill="#C6973F">तत्त्व</text>
          </svg>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ?ink=light  → flip ink token to cream for dark-surface embeds.
    if (new URLSearchParams(location.search).get('ink') === 'light') {
      document.documentElement.classList.add('dark-surface');
      // Re-color the static fills inside the SVGs (they're hard-coded for max
      // simplicity; this script flips them when the URL flag is set).
      document.querySelectorAll('[fill="#0E1C36"]').forEach(el => {
        el.setAttribute('fill', '#FBF5E7');
      });
    }
  </script>

</body>
</html>
